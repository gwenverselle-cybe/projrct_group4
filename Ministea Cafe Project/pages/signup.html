<div class="page-wrapper">
    <div class="d-flex align-items-center gap-5 justify-content-center" style="flex-wrap:nowrap;">
      <div class="signup-card">
        <h2>Sign Up</h2>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="signupEmail">
        </div>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="signupUser">
        </div>
        <div class="mb-3">
          <div class="pw-label-row">
            <label class="form-label mb-0">Password</label>
          </div>
          <div class="password-wrapper mt-1">
            <input type="password" class="form-control" id="pw1">
            <button class="toggle-pw" type="button" data-target="pw1">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
              Hide
            </button>
          </div>
        </div>
        <div class="mb-3">
          <div class="pw-label-row">
            <label class="form-label mb-0">Confirm Password</label>
          </div>
          <div class="password-wrapper mt-1">
            <input type="password" class="form-control" id="pw2">
            <button class="toggle-pw" type="button" data-target="pw2">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
              Hide
            </button>
          </div>
        </div>
        <button class="btn-create" id="createAccountBtn">Create Account</button>
        <div class="mt-3 text-center">
          <button class="btn-signin ajax-link" id="signInBtn" data-target="pages/signin.html">
            Already have an account? <strong>Sign in</strong>
          </button>
        </div>
        <p class="terms-text">
          By creating an account, you agree to the <a href="#">Terms of use</a> and <a href="#">Privacy Policy.</a>
        </p>
      </div>
      <div class="logo-area">
        <img src="images/MinisteaLogo.png" alt="Ministea Cafe Logo" class="logo-img"/>
      </div>
    </div>
  </div>
